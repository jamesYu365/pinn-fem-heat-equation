domain:
  Lx: 1.0
  Ly: 1.0

fem:
  nx: 20
  ny: 20
  dt: 0.01
  T_end: 0.5

physics:
  alpha: 0.01

seed: 42

case: 1

pinn:
  mode: forward
  layers: [3, 8, 16, 16, 8, 1]
  peak_lr: 0.005
  end_lr: 1e-5
  epochs: 6000
  num_collocation: 4000
  num_ic: 1000
  num_bc: 1000
  lambda_r: 1.0
  lambda_ic: 100.0
  lambda_bc: 100.0
  adaptive_loss:
    enabled: true
    beta: 0.98
    min_scale: 0.2
    max_scale: 5.0
  warmup_epochs: 300
  log_every: 300
  # clip_grad_norm: 2.0
  num_val_collocation: 2000
  num_val_ic: 500
  num_val_bc: 500
  val_time_ratio: 0.6
  early_stop_patience: 1000

  # 反问题参数
  inverse:
    initial_alpha: 0.005
    num_observation: 200
    noise_level: 0.01
    lambda_data: 10.0
    alpha_lr: 0.001
